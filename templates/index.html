<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股多因子量化分析</title>
<style>
  :root {
    --bg: #f5f5f7;
    --card: #fff;
    --border: #e8e8ed;
    --text: #1d1d1f;
    --muted: #86868b;
    --red: #ee3f4d;
    --green: #00a870;
    --blue: #3b6df0;
    --amber: #f5a623;
    --purple: #7c3aed;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5;
    min-height: 100vh;
  }

  .container { max-width: 820px; margin: 0 auto; padding: 32px 16px 80px; }

  header { text-align: center; margin-bottom: 28px; }
  header h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; }
  header p { color: var(--muted); font-size: 13px; margin-top: 4px; }

  /* Tabs */
  .tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
  .tab {
    padding: 10px 22px; cursor: pointer; font-size: 14px; color: var(--muted);
    border-bottom: 2px solid transparent; transition: all .2s; user-select: none;
  }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 500; }
  .tab:hover { color: var(--text); }

  /* Search */
  .search-wrap { position: relative; margin-bottom: 20px; }
  .search-row { display: flex; gap: 10px; }
  .search-row input {
    flex: 1; padding: 12px 16px; border: 1px solid var(--border); border-radius: 12px;
    font-size: 15px; outline: none; background: var(--card); transition: border .2s;
  }
  .search-row input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,109,240,.12); }
  .search-row button {
    padding: 12px 28px; background: var(--blue); color: #fff; border: none;
    border-radius: 12px; font-size: 15px; cursor: pointer; font-weight: 500;
    transition: opacity .2s; white-space: nowrap;
  }
  .search-row button:hover { opacity: .88; }
  .search-row button:disabled { opacity: .45; cursor: not-allowed; }

  /* Search dropdown */
  .search-dropdown {
    position: absolute; top: 100%; left: 0; right: 0; margin-top: 4px;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    max-height: 240px; overflow-y: auto; z-index: 10; display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,.08);
  }
  .search-dropdown.show { display: block; }
  .search-dropdown .item {
    padding: 10px 16px; cursor: pointer; font-size: 14px; display: flex;
    justify-content: space-between; align-items: center;
  }
  .search-dropdown .item:hover { background: #f0f4ff; }
  .search-dropdown .item .code { color: var(--muted); font-size: 12px; }

  /* Quick picks */
  .quick-picks { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
  .quick-pick {
    padding: 5px 14px; border-radius: 20px; background: var(--card); border: 1px solid var(--border);
    font-size: 13px; color: var(--muted); cursor: pointer; transition: all .15s;
    user-select: none;
  }
  .quick-pick:hover { color: var(--blue); border-color: var(--blue); }

  /* History */
  .history { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .history-tag {
    padding: 4px 12px; border-radius: 16px; background: #eef1ff; font-size: 12px;
    color: var(--blue); cursor: pointer; display: flex; align-items: center; gap: 4px;
    transition: all .15s;
  }
  .history-tag:hover { background: #dde4ff; }
  .history-tag .x { opacity: .5; font-size: 14px; }
  .history-tag .x:hover { opacity: 1; }

  /* Cards */
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 20px 22px; margin-bottom: 14px; transition: box-shadow .2s;
  }
  .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.04); }
  .card h2 { font-size: 13px; font-weight: 500; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 14px; }

  /* Stock header */
  .stock-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
  .stock-name { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  .stock-code { color: var(--muted); font-size: 13px; }
  .stock-price { font-size: 24px; font-weight: 600; margin-left: auto; letter-spacing: -0.5px; }
  .stock-change { font-size: 15px; font-weight: 500; margin-left: 6px; }
  .meta-row { display: flex; gap: 18px; flex-wrap: wrap; font-size: 13px; color: var(--muted); margin-bottom: 18px; }
  .meta-row strong { color: var(--text); font-weight: 500; }

  /* Score */
  .score-big { display: flex; align-items: center; gap: 16px; padding: 18px;
    background: linear-gradient(135deg, #f0f4ff, #faf5ff); border-radius: 12px; margin-bottom: 18px; }
  .score-circle {
    width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 28px; font-weight: 600; color: #fff; flex-shrink: 0;
  }
  .score-text { flex: 1; }
  .score-label { font-size: 13px; color: var(--muted); }
  .score-value { font-size: 20px; font-weight: 600; }
  .prob-value { font-size: 14px; color: var(--blue); font-weight: 500; }
  .type-badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 12px;
    background: #eef1ff; color: var(--blue); margin-left: 8px; vertical-align: middle; }

  /* Factor bars */
  .factor-list { display: flex; flex-direction: column; gap: 8px; }
  .factor-row { display: flex; align-items: center; gap: 12px; }
  .factor-name { width: 72px; font-size: 13px; font-weight: 500; flex-shrink: 0; }
  .factor-bar-bg { flex: 1; height: 8px; background: #e8e8ed; border-radius: 4px; overflow: hidden; }
  .factor-bar { height: 100%; border-radius: 4px; transition: width .6s cubic-bezier(.4,0,.2,1); }
  .factor-score { width: 30px; text-align: right; font-size: 13px; font-weight: 600; flex-shrink: 0; }
  .factor-weight { width: 44px; text-align: right; font-size: 11px; color: var(--muted); flex-shrink: 0; }

  /* Grid */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  @media (max-width: 600px) { .grid-2, .grid-4 { grid-template-columns: 1fr 1fr; } }
  .metric {
    padding: 10px 14px; background: #f8f9fb; border-radius: 8px; font-size: 13px;
  }
  .metric .label { color: var(--muted); font-size: 11px; }
  .metric .value { font-weight: 500; font-size: 14px; }

  /* Risks */
  .risk-list { list-style: none; }
  .risk-list li {
    padding: 8px 14px; font-size: 13px; margin-bottom: 6px; border-radius: 8px;
    border-left: 3px solid var(--amber); background: #fffbeb; line-height: 1.5;
  }

  /* Compare table */
  .cmp-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .cmp-table th { text-align: left; padding: 8px 10px; border-bottom: 2px solid var(--border);
    color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
  .cmp-table td { padding: 12px 10px; border-bottom: 1px solid var(--border); }
  .cmp-table tbody tr { transition: background .15s; }
  .cmp-table tbody tr:hover { background: #f8f9fb; }
  .cmp-table tr:last-child td { border-bottom: none; }

  /* States */
  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border);
    border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite;
    vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { text-align: center; color: var(--red); padding: 32px 16px; font-size: 14px; }
  .empty { text-align: center; color: var(--muted); padding: 48px 16px; font-size: 14px; }
  .empty svg { display: block; margin: 0 auto 12px; opacity: .3; }

  footer { text-align: center; margin-top: 40px; font-size: 12px; color: var(--muted); }

  .red { color: var(--red); } .green { color: var(--green); }
  .highlight { color: var(--blue); font-weight: 500; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>A股多因子量化分析</h1>
    <p>动量 · 均值回归 · 技术指标 · 量价分析 · 基本面 · 市场环境 — 六维权重打分</p>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('single')">单票分析</div>
    <div class="tab" onclick="switchTab('compare')">多票对比</div>
  </div>

  <!-- Single Stock Tab -->
  <div id="tab-single">
    <div class="search-wrap">
      <div class="search-row">
        <input type="text" id="stock-input" placeholder="输入股票名称或6位代码，如 恒瑞医药 / 600276"
               autocomplete="off" 
               oninput="handleInput(this.value)"
               onkeydown="handleKey(event)">
        <button id="analyze-btn" onclick="analyze()">分析</button>
      </div>
      <div class="search-dropdown" id="dropdown"></div>
    </div>

    <div id="history-row"></div>

    <div class="quick-picks">
      <span style="font-size:12px;color:var(--muted);align-self:center;margin-right:4px">快速查看:</span>
      <span class="quick-pick" onclick="quickAnalyze('600276')">恒瑞医药</span>
      <span class="quick-pick" onclick="quickAnalyze('002962')">五方光电</span>
      <span class="quick-pick" onclick="quickAnalyze('600584')">长电科技</span>
      <span class="quick-pick" onclick="quickAnalyze('600519')">贵州茅台</span>
      <span class="quick-pick" onclick="quickAnalyze('300750')">宁德时代</span>
      <span class="quick-pick" onclick="quickAnalyze('000858')">五 粮 液</span>
    </div>

    <div id="stock-result">
      <div class="empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <p>输入股票代码或名称开始分析</p>
      </div>
    </div>
  </div>

  <!-- Compare Tab -->
  <div id="tab-compare" style="display:none">
    <div class="search-row" style="margin-bottom:16px">
      <input type="text" id="compare-input" placeholder="输入多个代码，逗号分隔，如 600276,600519,300750"
             onkeydown="if(event.key==='Enter')compare()">
      <button id="compare-btn" onclick="compare()">对比</button>
    </div>
    <div class="quick-picks">
      <span style="font-size:12px;color:var(--muted);align-self:center;margin-right:4px">快速对比:</span>
      <span class="quick-pick" onclick="quickCompare('600276,600519,300750')">医药+白酒+锂电</span>
      <span class="quick-pick" onclick="quickCompare('002962,600584')">光学+半导体</span>
      <span class="quick-pick" onclick="quickCompare('000858,600809')">白酒双雄</span>
    </div>
    <div id="compare-result">
      <div class="empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <p>输入多个股票代码进行横向对比</p>
      </div>
    </div>
  </div>

  <footer>
    数据来源：东方财富 · AkShare &nbsp;|&nbsp; 因子引擎 v1.0 &nbsp;|&nbsp;
    ⚠ 量化因子分析仅供参考，不构成投资建议
  </footer>
</div>

<script>
// ── State ──
let currentTab = 'single';
let searchTimer = null;
const HISTORY_KEY = 'stock_analyzer_history';
let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');

// ── Tab switching ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (tab==='single'?i===0:i===1)));
  document.getElementById('tab-single').style.display = tab === 'single' ? '' : 'none';
  document.getElementById('tab-compare').style.display = tab === 'compare' ? '' : 'none';
}

// ── History ──
function addHistory(code, name) {
  history = history.filter(h => h.code !== code);
  history.unshift({ code, name, time: Date.now() });
  if (history.length > 8) history.pop();
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  renderHistory();
}

function removeHistory(code) {
  history = history.filter(h => h.code !== code);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('history-row');
  if (history.length === 0) { el.innerHTML = ''; return; }
  let html = '<div class="history"><span style="font-size:12px;color:var(--muted);align-self:center;margin-right:4px">最近:</span>';
  for (const h of history) {
    html += `<span class="history-tag" onclick="quickAnalyze('${h.code}')">${h.name}<span class="x" onclick="event.stopPropagation();removeHistory('${h.code}')">&times;</span></span>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

// ── Search ──
async function handleInput(val) {
  clearTimeout(searchTimer);
  const dropdown = document.getElementById('dropdown');
  if (val.length < 1) { dropdown.classList.remove('show'); return; }
  if (/^\d{1,6}$/.test(val)) { dropdown.classList.remove('show'); return; }

  searchTimer = setTimeout(async () => {
    try {
      const resp = await fetch(`/api/search?q=${encodeURIComponent(val)}`);
      const data = await resp.json();
      if (!data.results || data.results.length === 0) {
        dropdown.classList.remove('show'); return;
      }
      let html = '';
      for (const r of data.results) {
        html += `<div class="item" onclick="pickStock('${r.代码}','${r.名称}')">
          <span>${r.名称}</span><span class="code">${r.代码}</span></div>`;
      }
      dropdown.innerHTML = html;
      dropdown.classList.add('show');
    } catch(e) { dropdown.classList.remove('show'); }
  }, 250);
}

function pickStock(code, name) {
  document.getElementById('stock-input').value = name;
  document.getElementById('dropdown').classList.remove('show');
  analyzeDirect(code, name);
}

function handleKey(e) {
  if (e.key === 'Escape') { document.getElementById('dropdown').classList.remove('show'); }
}

// ── Close dropdown on click outside ──
document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) {
    document.getElementById('dropdown').classList.remove('show');
  }
});

// ── Quick analyze ──
function quickAnalyze(code) {
  document.getElementById('stock-input').value = '';
  document.getElementById('dropdown').classList.remove('show');
  analyzeDirect(code);
}

function quickCompare(codes) {
  document.getElementById('compare-input').value = codes;
  compare();
}

// ── Analyze ──
async function analyze() {
  const input = document.getElementById('stock-input').value.trim();
  if (!input) return;
  document.getElementById('dropdown').classList.remove('show');

  const btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  const resultDiv = document.getElementById('stock-result');
  resultDiv.innerHTML = '<div class="loading"><span class="spinner"></span>正在拉取数据，计算六因子...</div>';

  try {
    let code = input;
    let name = input;
    if (!/^\d{6}$/.test(input)) {
      const resp = await fetch(`/api/search?q=${encodeURIComponent(input)}`);
      const data = await resp.json();
      if (!data.results || data.results.length === 0) {
        resultDiv.innerHTML = '<div class="error">未找到匹配的股票，请检查名称或直接输入6位代码</div>';
        btn.disabled = false; return;
      }
      code = data.results[0].代码;
      name = data.results[0].名称;
    }
    await analyzeDirect(code, name);
  } catch(e) {
    resultDiv.innerHTML = `<div class="error">请求失败: ${e.message}</div>`;
  }
  btn.disabled = false;
}

async function analyzeDirect(code, name) {
  const btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  const resultDiv = document.getElementById('stock-result');
  resultDiv.innerHTML = '<div class="loading"><span class="spinner"></span>正在拉取数据，计算六因子...</div>';

  try {
    const resp = await fetch(`/api/analyze?code=${code}`);
    const data = await resp.json();
    if (data.error) {
      resultDiv.innerHTML = `<div class="error">${data.error}</div>`;
      btn.disabled = false; return;
    }
    addHistory(code, data.name);
    renderAnalysis(data, resultDiv);
  } catch(e) {
    resultDiv.innerHTML = `<div class="error">请求失败: ${e.message}</div>`;
  }
  btn.disabled = false;
}

// ── Render ──
function renderAnalysis(d, container) {
  const cls = d.change_pct >= 0 ? 'red' : 'green';
  const sgn = d.change_pct >= 0 ? '+' : '';
  const color = scoreColor(d.total_score);

  let h = `
  <div class="card">
    <div class="stock-header">
      <span class="stock-name">${esc(d.name)}</span>
      <span class="stock-code">${d.code}</span>
      <span class="stock-price">${d.price}</span>
      <span class="stock-change ${cls}">${sgn}${d.change_pct}%</span>
    </div>
    <div class="meta-row">
      <span>市值 <strong>${d.market_cap != null ? d.market_cap+'亿' : '--'}</strong></span>
      <span>PE <strong>${d.pe ?? '--'}</strong></span>
      <span>类型 <span class="type-badge">${typeLabel(d.stock_type)}</span></span>
      <span>耗时 <strong>${d.elapsed_ms}ms</strong></span>
    </div>

    <div class="score-big">
      <div class="score-circle" style="background:${color}">${d.total_score}</div>
      <div class="score-text">
        <div class="score-label">综合评分 <span style="font-weight:400;color:var(--muted)">/ 5.00</span></div>
        <div class="score-value">${d.total_score}</div>
        <div class="prob-value">短期上涨概率评估 ≈ ${d.probability}%</div>
      </div>
    </div>
  </div>`;

  // Factors
  h += '<div class="card"><h2>因子分解</h2><div class="factor-list">';
  const order = ['动量','均值回归','技术指标','量价分析','基本面','市场环境'];
  for (const name of order) {
    const f = d.factors[name]; if (!f) continue;
    const w = d.weights[name]; 
    h += `<div class="factor-row">
      <span class="factor-name">${name}</span>
      <div class="factor-bar-bg"><div class="factor-bar" style="width:${Math.max(4,f.score*20)}%;background:${scoreColor(f.score)}"></div></div>
      <span class="factor-score" style="color:${scoreColor(f.score)}">${f.score}</span>
      <span class="factor-weight">×${Math.round(w*100)}%</span>
    </div>`;
  }
  h += '</div></div>';

  // Returns
  const rets = d.returns || {};
  if (Object.keys(rets).length) {
    h += '<div class="card"><h2>各周期涨跌</h2><div class="grid-4">';
    for (const [k,v] of Object.entries(rets)) {
      h += `<div class="metric"><div class="label">${k}</div><div class="value ${v>=0?'red':'green'}">${v>=0?'+':''}${v}%</div></div>`;
    }
    h += '</div></div>';
  }

  // MA
  const mas = d.ma_values || {};
  if (Object.keys(mas).length) {
    h += '<div class="card"><h2>均线系统</h2><div class="grid-4">';
    for (const [k,v] of Object.entries(mas)) {
      const above = d.price > v;
      h += `<div class="metric"><div class="label">${k}</div><div class="value ${above?'green':'red'}">${v} ${above?'↑':'↓'}</div></div>`;
    }
    h += '</div></div>';
  }

  // Tech details
  const tech = d.factors['技术指标']?.detail;
  if (tech) {
    h += '<div class="card"><h2>指标细项</h2><div class="grid-2">';
    if (tech.MACD) h += `<div class="metric"><div class="label">MACD ${tech.MACD.信号}</div><div class="value">DIF ${tech.MACD.DIF} / DEA ${tech.MACD.DEA}</div></div>`;
    if (tech.RSI) h += `<div class="metric"><div class="label">RSI</div><div class="value">6日 ${tech.RSI.RSI6} / 12日 ${tech.RSI.RSI12}</div></div>`;
    if (tech.KDJ) h += `<div class="metric"><div class="label">KDJ ${tech.KDJ.信号}</div><div class="value">K ${tech.KDJ.K} D ${tech.KDJ.D} J ${tech.KDJ.J}</div></div>`;
    if (tech['布林带']) {
      const bb = tech['布林带'];
      h += `<div class="metric"><div class="label">布林带</div><div class="value">上 ${bb.上轨} / 中 ${bb.中轨} / 下 ${bb.下轨}</div></div>`;
    }
    h += '</div></div>';
  }

  // Risks
  if (d.risks && d.risks.length) {
    h += '<div class="card"><h2>风险提示</h2><ul class="risk-list">';
    for (const r of d.risks) h += `<li>${esc(r)}</li>`;
    h += '</ul></div>';
  }

  container.innerHTML = h;
}

// ── Compare ──
async function compare() {
  const input = document.getElementById('compare-input').value.trim();
  if (!input) return;
  const resultDiv = document.getElementById('compare-result');
  const btn = document.getElementById('compare-btn');
  btn.disabled = true;
  resultDiv.innerHTML = '<div class="loading"><span class="spinner"></span>正在分析多只股票...</div>';

  try {
    const resp = await fetch(`/api/compare?codes=${encodeURIComponent(input)}`);
    const data = await resp.json();
    if (data.error) { resultDiv.innerHTML = `<div class="error">${data.error}</div>`; btn.disabled = false; return; }
    renderComparison(data, resultDiv);
  } catch(e) { resultDiv.innerHTML = `<div class="error">请求失败: ${e.message}</div>`; }
  btn.disabled = false;
}

function renderComparison(data, container) {
  let h = '<div class="card"><h2>横向对比</h2>';
  h += '<table class="cmp-table"><thead><tr>';
  ['名称','代码','价格','涨跌','PE','类型','评分','概率'].forEach(t => h += `<th>${t}</th>`);
  h += '</tr></thead><tbody>';
  const sorted = (data.comparison||[]).sort((a,b) => (b.score||0)-(a.score||0));
  for (const r of sorted) {
    const c = r.change >= 0 ? 'red' : 'green';
    const sc = scoreColor(r.score);
    h += `<tr>
      <td><strong>${esc(r.name)}</strong></td><td style="color:var(--muted)">${r.code}</td>
      <td>${r.price}</td><td class="${c}">${r.change>=0?'+':''}${r.change}%</td>
      <td>${r.pe??'--'}</td><td><span class="type-badge">${typeLabel(r.type)}</span></td>
      <td><strong style="color:${sc};font-size:15px">${r.score}</strong></td>
      <td><span class="highlight">${r.probability}%</span></td>
    </tr>`;
  }
  h += '</tbody></table></div>';

  // Detailed cards for each
  if (data.results) {
    for (const r of data.results) {
      if (r.error) continue;
      h += '<div style="margin-top:10px">';
      const tmp = document.createElement('div');
      renderAnalysis(r, tmp);
      h += tmp.innerHTML + '</div>';
    }
  }
  container.innerHTML = h;
}

// ── Helpers ──
function scoreColor(s) {
  if (s >= 4) return '#00a870'; else if (s >= 3) return '#3b6df0';
  else if (s >= 2) return '#f5a623'; else return '#ee3f4d';
}
function typeLabel(t) {
  return {small_cap:'小盘题材',momentum_driven:'赛道动量',large_cap_value:'大盘价值'}[t]||t;
}
function esc(s) { return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Init ──
renderHistory();
